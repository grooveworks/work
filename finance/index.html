const yen=v=>'¥'+Math.round(Number(v)).toLocaleString();
const man=v=>(v/10000).toFixed(0)+'万';
const mlabel=ym=>{if(ym==null)return'';const s=String(ym);const mt=s.match(/(\d{4})[-\/]?(\d{1,2})/);if(mt)return parseInt(mt[2],10)+'月';const dt=new Date(s);if(!isNaN(dt.getTime()))return(dt.getMonth()+1)+'月';return s;};
const donutColors=t=>[t.sky,t.green,t.violet,"#fb923c","#22d3ee",t.gray];

function App(){
 const[tab,setTab]=useState('sales');
 const[theme,setTheme]=useState('dark');
 const[d,setD]=useState(SEED);
 const[live,setLive]=useState(false);
 const[err,setErr]=useState(null);
 const[op,setOp]=useState({orders:false,tl:false,sim:false,trend:false});
 const[exp,setExp]=useState(null);   // 記載漏れの保険（層1・期待エンジン fn=expect）
 const t=TOK[theme];
 const W=useWidth();const sm=W<860;

 useEffect(()=>{
  // 記載漏れの保険は命綱＝取得失敗時は自動で再試行（最大4回・4秒間隔）。黙って諦めない
  var dead=false;
  var goExp=function(n){
   fetch(ENGINE_URL+"?key="+encodeURIComponent(ENGINE_KEY)+"&fn=expect").then(r=>r.json())
    .then(function(x){if(dead)return; if(x&&!x.error)setExp(x); else if(n>0)setTimeout(function(){goExp(n-1);},4000);})
    .catch(function(){if(!dead&&n>0)setTimeout(function(){goExp(n-1);},4000);});
  };
  goExp(4);
  Promise.all([
   fetch(GAS_URL+"?key="+encodeURIComponent(API_KEY)).then(r=>r.json()),
   fetch(ENGINE_URL+"?key="+encodeURIComponent(ENGINE_KEY)+"&fn=dashtx").then(r=>r.json()).catch(function(){return null;})
  ]).then(function(res){
   var j=res[0], tx=res[1];
   if(j.error){setErr(j.error);return;}
   if(tx && !tx.error){ j.transactions=tx; }
   try{
    const nd=JSON.parse(JSON.stringify(SEED));
    const s=j.sales||[];
    if(s.length){
     nd.months=s.map(x=>x.month+'月');
     nd.sales=s.map(x=>x.totalSales||0);
     nd.budget=s.map(x=>x.budget||0);
     nd.prevYear=s.map(x=>x.prevYearSales||0);
    }
    const tx=j.transactions||{};
    const bt=tx.accountBalanceTrend||[];const an=[...new Set((tx.byAccount||[]).map(a=>a.name))];
    if(bt.length){nd.balTrend=bt.map(b=>({m:mlabel(b.yearMonth),bal:an.reduce((s2,n)=>s2+(b[n]||0),0)}));}
    const ba=tx.byAccount||[];if(ba.length){
     nd.acctsLive=ba.filter(a=>a.lastBalance>0).map(a=>({n:a.name,bal:a.lastBalance}));
     nd.totBalLive=ba.reduce((s2,a)=>s2+(a.lastBalance||0),0);
    }
    const po=j.payoffTimeline||[];if(po.length){
     nd.payoff=po.map(p=>({d:p.endDate,n:(p.note==='★'||p.monthly>=2e5?'★':'')+p.lender+' '+(p.content||''),m:p.monthly,c:p.cumReduction,star:p.monthly>=5e5?'red':(p.monthly>=1e5?'amber':null)}));
     nd.tlLabels=po.filter(p=>p.cumReduction>0).map(p=>p.endDate);nd.tlCum=po.filter(p=>p.cumReduction>0).map(p=>p.cumReduction);
    }
    const fx=j.fixedExpenses||{};if(fx.items&&fx.items.length){
     const byc={};fx.items.forEach(it=>{byc[it.category]=(byc[it.category]||0)+(it.monthly||0)});
     const ent=Object.entries(byc).sort((a,b)=>b[1]-a[1]);
     const top=ent.slice(0,6);const rest=ent.slice(6).reduce((s2,e)=>s2+e[1],0);
     nd.fixedLabels=top.map(e=>e[0]).concat(rest>0?['その他']:[]);
     nd.fixedData=top.map(e=>e[1]).concat(rest>0?[rest]:[]);
     nd.fixedTotal=fx.monthlyTotal;
    }
    setD(nd);setLive(true);
   }catch(e){setErr('データ整形エラー: '+e.message);}
  }).catch(e=>setErr(e.message));
  return function(){dead=true;};
 },[]);

 const latest=d.sales.length?d.sales[d.sales.length-1]:0;
 const latestBudget=d.budget.length?d.budget[d.budget.length-1]:0;
 const cumS=d.sales.reduce((a,b)=>a+b,0);
 const cumB=d.budget.reduce((a,b)=>a+b,0);
 const totBal=d.totBalLive!=null?d.totBalLive:d.balances[d.balances.length-1];

 const cl=k=>t[k]||k;
 const card=(extra)=>({background:t.panel,border:"1px solid "+t.border,borderRadius:20,padding:18,...extra});
 const mono={fontFamily:'"SF Mono",Menlo,Consolas,monospace',fontVariantNumeric:'tabular-nums',letterSpacing:'-.01em'};

 const NAV=[

  {id:'profit',label:'採算・利益',kick:'要因 ・ 新規',icon:'ph-scales',c:t.accent,badge:'新規'},
  {id:'cash',label:'資金',kick:'命綱',icon:'ph-wallet',c:t.amber},
  {id:'fin',label:'財務',kick:'体質',icon:'ph-flag-checkered',c:t.red}
 ];

 // ---- reusable bits ----
 const Kpi=({label,value,sub,vc,subc,accent,icon,ic})=>(
  <div style={{background:t.panel,border:(accent?"1.5px solid "+t.accentBd:"1px solid "+t.border),borderRadius:16,padding:"15px 16px",boxShadow:accent?"0 0 0 3px "+t.accentGlow:"none"}}>
   <div style={{fontSize:11,color:accent?t.accent:t.text2,marginBottom:8,display:'flex',alignItems:'center',gap:6,fontWeight:accent?500:400}}>{icon&&<i className={"ph "+icon}></i>}{label}</div>
   <div className="mono" style={{fontSize:23,fontWeight:700,color:vc||t.text}}>{value}</div>
   {sub&&<div style={{fontSize:11,color:subc||t.muted,marginTop:5}}>{sub}</div>}
  </div>
 );
 const Note=({children,kind})=>{const bg=kind==='red'?t.redBg:kind==='amber'?t.amberBg:t.panel2,bd=kind==='red'?t.redBd:kind==='amber'?t.amberBd:t.border,tc=kind==='red'?t.red:kind==='amber'?t.amber:t.text2;
  return <div style={{background:bg,border:"1px solid "+bd,borderLeft:"3px solid "+(kind==='red'?t.red:kind==='amber'?t.amber:t.border),borderRadius:12,padding:"12px 14px",fontSize:12.5,lineHeight:1.7,color:tc}}>{children}</div>;};
 const Drill=({k,title,sub,children})=>(
  <div style={{...card({padding:0,marginTop:12,overflow:'hidden'})}}>
   <button data-drill={k} onClick={()=>setOp({...op,[k]:!op[k]})} style={{width:'100%',background:'transparent',border:'none',display:'flex',alignItems:'center',gap:10,padding:"14px 16px",cursor:'pointer',color:t.text,textAlign:'left'}}>
    <i className={"ph "+(op[k]?'ph-caret-down':'ph-caret-right')} style={{color:t.muted}}></i>
    <span style={{fontSize:13.5,fontWeight:600,flex:1}}>{title}{sub&&<span style={{color:t.muted,fontWeight:400,marginLeft:8,fontSize:12}}>{sub}</span>}</span>
   </button>
   {op[k]&&<div style={{padding:"0 16px 16px",borderTop:"1px solid "+t.divider}}>{children}</div>}
  </div>
 );
 const tip=(o)=>(<div style={{background:t.panel,border:"1px solid "+t.border,borderRadius:8,padding:"8px 12px",fontSize:12}}>{o.active&&o.payload&&[<div key="l" style={{color:t.text,fontWeight:600,marginBottom:3}}>{o.label}</div>,...o.payload.map((p,i)=><div key={i} style={{color:p.color}}>{p.name}: {yen(p.value)}</div>)]}</div>);
 const axis={tick:{fill:t.text2,fontSize:11},stroke:t.border};

 const SecHead=({n,title,q,nc,badge})=>(
  <div style={{marginBottom:20}}>
   <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
    <span className="mono" style={{color:nc,fontSize:13,fontWeight:700}}>{n}</span>
    <span style={{fontSize:21,fontWeight:700,color:t.text,whiteSpace:'nowrap'}}>{title}</span>
    {badge&&<span style={{fontSize:10,fontWeight:500,color:t.accent,background:t.accentBg,border:"1px solid "+t.accentBd,borderRadius:6,padding:"2px 7px"}}>新規</span>}
   </div>
   <div style={{fontSize:13,color:t.muted,marginTop:6}}>{q}</div>
  </div>
 );
 const NextBtn=({to,label,c})=>(
  <button onClick={()=>{setTab(to);window.scrollTo({top:0})}} style={{marginTop:18,background:c,color:'#fff',border:'none',borderRadius:12,padding:"12px 18px",fontSize:13,fontWeight:600,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:8}}>{label}<i className="ph ph-arrow-right"></i></button>
 );
 const Unset=({label})=>(<span style={{fontSize:10,fontWeight:500,color:t.amber,background:t.amberBg,border:"1px solid "+t.amberBd,borderRadius:6,padding:"2px 7px",marginLeft:8}}>{label}</span>);

 // ---- charts ----
 const chartData=d.months.map((m,i)=>({month:m,actual:d.sales[i],budget:d.budget[i],prevYear:d.prevYear[i],rate:d.budget[i]?Math.round(d.sales[i]/d.budget[i]*100):0}));
 const balData=d.balTrend||SEED.months.map((m,i)=>({m,bal:SEED.balances[i]}));
 const cfData=SEED.months.map((m,i)=>({month:m,income:SEED.sales[i],expense:SEED.out[i],diff:SEED.sales[i]-SEED.out[i]}));
 const custData=d.custLabels.map((n,i)=>({name:n,value:d.custData[i]}));
 const catData=d.catLabels.map((n,i)=>({name:n,value:d.catData[i]})).sort((a,b)=>b.value-a.value);
 const fixedData=d.fixedLabels.map((n,i)=>({name:n,value:d.fixedData[i]}));
 const tlData=d.tlLabels.map((m,i)=>({d:m,cum:d.tlCum[i]}));
 const custTotal=d.custData.reduce((a,b)=>a+b,0);const idePct=custTotal?Math.round(d.custData[0]/custTotal*100):0;

 const Sales=()=>(<div>
  <SecHead n="①" title="売上・受注" nc={t.sky} q="受注（先）から売上（結果）まで ─ いくら売れて、この先いくら確保しているか"/>
  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:12,marginBottom:12}}>
   <Kpi label={"直近月売上 ・ "+d.months[d.months.length-1]} value={yen(latest)} vc={t.sky} sub={"予算比 "+(latestBudget?Math.round(latest/latestBudget*100):'—')+"%"} subc={t.green}/>
   <Kpi label="年度累計売上" value={yen(cumS)} vc={t.green} sub={d.sales.length+"ヶ月合計"}/>
   <Kpi label="年度予算達成率" value={(cumB?Math.round(cumS/cumB*100):'—')+"%"} vc={t.amber} sub={"予算 "+yen(cumB)}/>
   <Kpi label="受注残" icon="ph-stack" accent value="未取得" vc={t.amber} sub="Salesforce未連携（先読み・接続待ち）"/>

     <div key={nv.id}>
      <button onClick={()=>{setTab(nv.id);window.scrollTo({top:0})}} title={nv.label} style={{display:'flex',alignItems:'center',gap:11,width:'100%',padding:sm?"9px 6px":"9px 8px",borderRadius:11,border:'none',cursor:'pointer',background:a?t.navActive:'transparent',boxShadow:a?"inset 0 0 0 1.5px "+nv.c:'none',marginBottom:2,textAlign:'left'}}>
       <span style={{width:30,height:30,borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0,background:a?nv.c:t.panel2,color:a?'#fff':t.text2}}><i className={"ph "+nv.icon}></i></span>
       {!sm&&<span style={{flex:1,minWidth:0}}><span style={{display:'block',fontSize:9.5,color:t.muted}}>{nv.kick}</span><span style={{display:'block',fontSize:13.5,fontWeight:600,color:a?t.text:t.text2}}>{nv.label}{nv.badge&&<span style={{fontSize:9,color:t.accent,marginLeft:5}}>新規</span>}</span></span>}
       {!sm&&<i className="ph ph-caret-right" style={{color:t.muted,opacity:a?.9:0,fontSize:12}}></i>}
      </button>
      {i<NAV.length-1&&!sm&&<div className="navline" style={{background:t.divider}}></div>}
     </div>);})}
    <div style={{marginTop:'auto'}}>
     {live?<div style={{fontSize:10,color:t.green,marginBottom:8,display:sm?'none':'flex',alignItems:'center',gap:5}}><i className="ph-fill ph-circle" style={{fontSize:7}}></i>実データ取得済</div>:err?<div style={{fontSize:10,color:t.amber,marginBottom:8,display:sm?'none':'block'}}>静的データ表示中</div>:null}
     <div style={{display:'flex',background:t.panel2,borderRadius:10,padding:3}}>
      {[['dark','ダーク','ph-moon'],['light','ライト','ph-sun']].map(m=>(
       <button key={m[0]} onClick={()=>setTheme(m[0])} style={{flex:1,border:'none',cursor:'pointer',borderRadius:8,padding:sm?"7px 0":"7px 6px",fontSize:11,fontWeight:600,background:theme===m[0]?t.navActive:'transparent',color:theme===m[0]?t.text:t.muted,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}><i className={"ph "+m[2]}></i>{!sm&&m[1]}</button>
      ))}
     </div>
    </div>
   </div>
   {/* main */}
   <div style={{flex:1,minWidth:0,maxWidth:1180,padding:sm?"22px 16px 60px":"30px 36px 64px"}}>
    {err&&<div style={{...card({background:t.amberBg,border:"1px solid "+t.amberBd,marginBottom:16})}}><span style={{color:t.amber,fontSize:12.5}}>⚠ GAS取得に失敗（{err}）。既知の静的データで表示中。</span></div>}
    {tab==='sales'&&<Sales/>}{tab==='profit'&&<Profit/>}{tab==='cash'&&<Cash/>}{tab==='fin'&&<Fin/>}
    <div style={{textAlign:'center',padding:"28px 0 8px",fontSize:10,color:t.muted}}>GROOVE-WORKS 経営ダッシュボード ・ v5</div>
   </div>
  </div>
 );
}
function useWidth(){const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:1200);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);return w;}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
